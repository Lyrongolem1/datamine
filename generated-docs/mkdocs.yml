site_name: UCT Benchmark Documentation
site_author: UCT Benchmark Team, SDA TAP Lab Cohort 7
site_description: Documentation for the UCT Benchmark framework - a shared codebase between SDA TAP Lab and SpOC teams.

nav:
  - Home: index.md
  - Quick Start: QUICK_START.md
  - Getting Started: getting-started.md

  - Guides:
    - Overview: guides/README.md
    - Beginner's Guide: guides/BEGINNER_GUIDE.md
    - Dataset Generation: guides/DATASET_GENERATION.md
    - Evaluation Guide: guides/EVALUATION_GUIDE.md
    - Orekit Setup: guides/OREKIT_SETUP.md
    - UI Guide: guides/UI_GUIDE.md
    - Troubleshooting: guides/TROUBLESHOOTING.md
    - Code Examples: guides/EXAMPLES.md

  - Technical Reference:
    - Overview: technical/README.md
    - Architecture: technical/ARCHITECTURE.md
    - Pipeline: technical/PIPELINE.md
    - Database: technical/DATABASE.md
    - Backend API: technical/BACKEND_API.md
    - Frontend: technical/FRONTEND.md
    - Evaluation Metrics: technical/EVALUATION_METRICS.md
    - Configuration: technical/CONFIGURATION.md
    - Validation: technical/VALIDATION.md
    - Team Roles: technical/TEAM_ROLES.md

  - Reference:
    - Overview: reference/README.md
    - Glossary: reference/GLOSSARY.md
    - FAQ: reference/FAQ.md
    - Data Sources: technical/DATA_SOURCES.md
    - Provided Materials: reference/PROVIDED_MATERIALS_INDEX.md

  - Project:
    - Overview: planning/README.md
    - Project Status: planning/PROJECT_STATUS.md
    - Integrated Roadmap: planning/INTEGRATED_ROADMAP.md
    - Dependencies: planning/DEPENDENCIES.md
    - SDA TAP Lab Plan: planning/SDA_TAP_LAB_PLAN.md
    - SpOC Plan: planning/SPOC_PLAN.md
    - Contributing: CONTRIBUTING.md

  - Reports:
    - Overview: reports/README.md
    - Changelog: reports/CHANGELOG.md
    - Team Split Readiness: reports/TEAM_SPLIT_READINESS.md
    - Consistency Audit: reports/CONSISTENCY_AUDIT_REPORT.md
    - Documentation Review: reports/DOCUMENTATION_CONSISTENCY_REVIEW.md
    - Issues Backlog: reports/ISSUES_BACKLOG.md

  - Archive:
    - Historical Plans: archive/README.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
